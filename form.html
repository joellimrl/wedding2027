<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Joel and Hui Wen RSVP Form</title>
		<style>
			html,
			body {
				height: 100%;
			}

			body {
				margin: 0;
				background: transparent;
			}

			.tallyMount {
				height: 100%;
			}

			.tallyMount iframe {
				display: block;
				width: 100%;
				height: 100%;
				border: 0;
				background: transparent;
			}
		</style>
	</head>
	<body>
		<div class="tallyMount">
			<iframe
				data-tally-src="https://tally.so/embed/Pd07pB?alignLeft=1&hideTitle=1&transparentBackground=1"
				loading="lazy"
				width="100%"
				height="100%"
				frameborder="0"
				marginheight="0"
				marginwidth="0"
				title="Joel and Huiwen's Wedding Invitation"
			></iframe>
		</div>
		<script>
			var d = document,
				w = "https://tally.so/widgets/embed.js",
				v = function () {
					if (typeof Tally !== "undefined") {
						Tally.loadEmbeds();
					} else {
						d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (e) {
							e.src = e.dataset.tallySrc;
						});
					}
				};
			if (typeof Tally !== "undefined") v();
			else if (d.querySelector('script[src="' + w + '"]') == null) {
				var s = d.createElement("script");
				s.src = w;
				s.onload = v;
				s.onerror = v;
				d.body.appendChild(s);
			}
		</script>
	</body>
</html>
