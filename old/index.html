<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Joel and Hui Wen wedding page with an opening film that transitions into a grand hall backdrop."
    />
    <title>Joel & Hui Wen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="experience" data-experience>
      <div class="replayIntroLayer">
        <button class="replayIntroButton" type="button" data-replay-intro>
          Replay intro
        </button>
      </div>

      <section class="openingScene" data-opening-scene aria-label="Opening scene">
        <video
          class="openingVideo"
          data-opening-video
          autoplay
          muted
          playsinline
          preload="auto"
        >
          <source src="./opening.mp4" type="video/mp4" />
        </video>
      </section>

      <section class="mainHall" data-main-hall aria-label="Main hall">
        <div class="hallBackdrop" aria-hidden="true"></div>
        <div class="hallOverlay" aria-hidden="true"></div>

        <div class="hallContent">
          <p class="eyebrow">Save the date</p>
          <h1 class="names">Joel <span>&</span> Hui Wen</h1>
          <p class="lede">The gates open once. After that, guests arrive directly inside the hall.</p>
          <p class="meta">
            <span>19 June 2027</span>
            <span>7:00 PM</span>
            <span>Singapore</span>
          </p>
        </div>

        <div class="hallHotspots" aria-label="Interactive wedding details">
          <button
            class="hotspotCard hotspotCountdown"
            type="button"
            data-modal-trigger="countdown-modal"
            aria-controls="countdown-modal"
            aria-label="Open countdown"
          >
            <div id="countdown" class="countdownMount countdownMountHall"></div>
          </button>

          <button
            class="hotspotCard hotspotImageCard hotspotMap"
            type="button"
            data-modal-trigger="map-modal"
            aria-controls="map-modal"
            aria-label="Open map"
          >
            <img class="hotspotImage" src="./map.png" alt="Venue map preview" />
          </button>

          <button
            class="hotspotCard hotspotImageCard hotspotPortraits"
            type="button"
            data-modal-trigger="portraits-modal"
            aria-controls="portraits-modal"
            aria-label="Open portraits"
          >
            <img class="hotspotImage" src="./portraits_sample.jpeg" alt="Portrait gallery preview" />
          </button>

          <button
            class="hotspotCard hotspotImageCard hotspotRsvp"
            type="button"
            data-modal-trigger="rsvp-modal"
            aria-controls="rsvp-modal"
            aria-label="Open RSVP"
          >
            <img class="hotspotImage" src="./rsvp.png" alt="RSVP card preview" />
          </button>
        </div>
      </section>

      <section class="overlayLayer" aria-live="polite">
        <div id="countdown-modal" class="popupOverlay" data-popup="countdown-modal" hidden>
          <div class="popupDialog" role="dialog" aria-modal="true" aria-label="Countdown">
            <button class="overlayClose" type="button" data-popup-close aria-label="Close countdown popup">Close</button>
            <div class="popupSurface clockPopupSurface">
              <div class="specialClock" data-special-clock data-hw-location="work" data-joel-location="work">
                <div class="specialClockFace" aria-hidden="true">
                  <span class="specialClockFaceGlow"></span>
                  <span class="specialClockCenterRing"></span>
                  <span class="specialClockHub"></span>

                  <div class="specialClockLabels">
                    <span class="specialClockLabel" data-clock-place="work" style="--label-angle: 0deg">Work</span>
                    <span class="specialClockLabel" data-clock-place="gym" style="--label-angle: 60deg">Gym</span>
                    <span class="specialClockLabel" data-clock-place="yoga" style="--label-angle: 120deg">Yoga</span>
                    <span class="specialClockLabel" data-clock-place="toilet" style="--label-angle: 180deg">Toilet</span>
                    <span class="specialClockLabel" data-clock-place="bed" style="--label-angle: 240deg">Bed</span>
                    <span class="specialClockLabel" data-clock-place="desk" style="--label-angle: 300deg">Desk</span>
                  </div>

                  <span class="specialClockHand specialClockHandHw" data-clock-hand="hw">
                    <img class="specialClockHandTip" src="./clock_hw.png" alt="" />
                  </span>
                  <span class="specialClockHand specialClockHandJoel" data-clock-hand="joel">
                    <img class="specialClockHandTip" src="./clock_joel.png" alt="" />
                  </span>
                </div>

                <div class="specialClockReadout">
                  <p class="specialClockEyebrow">Where the hands are pointing</p>
                  <div class="specialClockStatusGrid">
                    <section class="specialClockNoteCard specialClockNoteCardHw">
                      <p class="specialClockPerson">Hui Wen</p>
                      <p class="specialClockStatus" data-clock-status="hw">Work</p>
                      <div class="specialClockNoteBox" data-clock-note="hw"></div>
                    </section>
                    <section class="specialClockNoteCard specialClockNoteCardJoel">
                      <p class="specialClockPerson">Joel</p>
                      <p class="specialClockStatus" data-clock-status="joel">Work</p>
                      <div class="specialClockNoteBox" data-clock-note="joel"></div>
                    </section>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="map-modal" class="popupOverlay" data-popup="map-modal" hidden>
          <div class="popupDialog" role="dialog" aria-modal="true" aria-label="Map">
            <button class="replayMapButton" type="button" data-replay-map>
              Replay
            </button>
            <button class="overlayClose" type="button" data-popup-close aria-label="Close map popup">Close</button>
            <div class="popupSurface mapPopupSurface" data-map-surface>
              <div class="mapIntroStage" data-map-intro-stage aria-hidden="true" hidden>
                <div class="mapIntroShell" aria-hidden="true">
                  <div class="mapIntroPaper">
                    <span class="mapIntroPaperFace mapIntroPaperFaceBase"></span>
                    <span class="mapIntroPaperFace mapIntroPaperFaceLeft"></span>
                    <span class="mapIntroPaperFace mapIntroPaperFaceRight"></span>
                  </div>
                </div>
              </div>

              <div class="mapWritingStage" data-map-writing-stage>
                <div class="mapWritingContainer">
                  <svg
                    class="mapSpellSvg"
                    viewBox="0 0 760 220"
                    aria-hidden="true"
                    preserveAspectRatio="xMidYMid meet"
                    data-map-spell-svg
                  >
                    <text class="mapSpellLineText" x="380" y="88" data-map-line-text>I solemnly swear</text>
                    <text class="mapSpellLineText" x="380" y="150" data-map-line-text>I am up to no good</text>
                  </svg>
                  <img class="mapQuill" src="./quill.png" alt="" data-map-quill />
                </div>
              </div>

              <div class="mapBlankStage" data-map-blank-stage hidden aria-hidden="true"></div>
            </div>
          </div>
        </div>

        <div id="portraits-modal" class="popupOverlay" data-popup="portraits-modal" hidden>
          <div class="popupDialog" role="dialog" aria-modal="true" aria-label="Portraits">
            <button class="overlayClose" type="button" data-popup-close aria-label="Close portraits popup">Close</button>
            <div class="popupSurface" aria-hidden="true"></div>
          </div>
        </div>

        <div id="rsvp-modal" class="popupOverlay" data-popup="rsvp-modal" hidden>
          <div class="popupDialog" role="dialog" aria-modal="true" aria-label="RSVP">
            <button class="overlayClose" type="button" data-popup-close aria-label="Close RSVP popup">Close</button>
            <div class="popupSurface rsvpPopupSurface">
              <iframe
                class="rsvpFormEmbed"
                data-tally-src="https://tally.so/embed/Pd07pB?alignLeft=1&hideTitle=1&transparentBackground=1"
                loading="lazy"
                width="100%"
                height="100%"
                frameborder="0"
                marginheight="0"
                marginwidth="0"
                title="Joel and Hui Wen RSVP form"
              ></iframe>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./index.js"></script>
  </body>
</html>
