<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Concept seven for Joel and Hui Wen's wedding page with a cinematic gate opening and a smooth zoom into a castle interior."
    />
    <title>Joel & Hui Wen — Concept 7</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles_7.css" />
  </head>
  <body>
    <main class="landingScene" data-scene>
      <section class="approachStage" aria-label="Castle gate landing page">
        <div class="atmosphere atmosphereLeft" aria-hidden="true"></div>
        <div class="atmosphere atmosphereRight" aria-hidden="true"></div>

        <div class="viewportShell">
          <div class="sceneViewport">
            <div class="interiorLayer" aria-hidden="true"></div>
            <div class="exteriorGlow" aria-hidden="true"></div>

            <button class="gateTrigger" type="button" data-gate-trigger aria-label="Open the gates and move into the castle">
              <span class="gateFrame" aria-hidden="true">
                <span class="gatePanel gatePanelLeft"></span>
                <span class="gatePanel gatePanelRight"></span>
                <span class="gateArch"></span>
                <span class="gateMullion"></span>
                <span class="gateHandle gateHandleLeft"></span>
                <span class="gateHandle gateHandleRight"></span>
              </span>

              <span class="gatePrompt">
                <span class="gateEyebrow">Concept 7</span>
                <strong>Open the gates</strong>
                <span>Click once to glide into the castle interior</span>
              </span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="../index_7.js"></script>
  </body>
</html>
