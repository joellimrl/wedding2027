<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Room Grid Test — position items &amp; walkable areas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #eee;
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Toolbar ──────────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    flex: 0 0 auto;
    flex-wrap: wrap;
  }
  .toolbar button {
    padding: 4px 12px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #2a2a2a;
    color: #eee;
    cursor: pointer;
    font-size: 13px;
  }
  .toolbar button:hover { background: #3a3a3a; }
  .toolbar button.active {
    background: #c9993c;
    color: #111;
    border-color: #c9993c;
  }
  .toolbar select {
    padding: 3px 6px;
    background: #2a2a2a;
    color: #eee;
    border: 1px solid #555;
    border-radius: 4px;
  }

  /* ── Middle area: canvas container ────────────────────── */
  .mid {
    flex: 1 1 auto;
    position: relative;
    min-height: 0;
    background: #000;
    cursor: crosshair;
  }
  .mid canvas {
    position: absolute;
    top: 0; left: 0;
    /* width/height set by JS */
  }

  /* ── HUD (top-right overlay) ─────────────────────────── */
  #hud {
    position: absolute;
    top: 8px; right: 12px;
    background: rgba(0,0,0,0.8);
    padding: 6px 12px;
    border-radius: 6px;
    font: 14px/1.6 Consolas, monospace;
    pointer-events: none;
    z-index: 2;
  }
  #hud .l { color: #999; }

  /* ── Bottom panel ─────────────────────────────────────── */
  .panel {
    flex: 0 0 auto;
    max-height: 28vh;
    overflow-y: auto;
    background: #1a1a1a;
    border-top: 1px solid #333;
    padding: 8px 16px 12px;
    font: 13px/1.5 Consolas, monospace;
  }
  .panel h3 { font-size: 13px; color: #c9993c; margin-bottom: 4px; }
  .pr { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
  .pr .d { color: #c44; cursor: pointer; background: none; border: none; font-size: 15px; font-weight: bold; }
  .pr .c { color: #8cf; }
  .pr .n { color: #fc8; }
  .empty { color: #666; font-style: italic; }
  #out {
    margin-top: 6px; width: 100%; height: 56px;
    background: #111; color: #8f8; border: 1px solid #444;
    font: 12px Consolas, monospace; padding: 6px; resize: vertical;
  }
</style>
</head>
<body>

<div class="toolbar">
  <strong>Mode:</strong>
  <button id="mWalk" class="active" onclick="setMode('walk')">Walk Zone</button>
  <button id="mItem" onclick="setMode('item')">Item</button>
  <span style="color:#666">|</span>
  <label>Grid:
    <select id="gSel" onchange="gridPct=+this.value; paint()">
      <option value="0">Off</option>
      <option value="10" selected>10 %</option>
      <option value="5">5 %</option>
      <option value="2">2 %</option>
    </select>
  </label>
  <button onclick="undo()">Undo last</button>
  <button onclick="clearMode()">Clear mode</button>
  <button onclick="copyOut()">Copy output</button>
  <span id="dbg" style="color:#f88; margin-left:auto;"></span>
</div>

<div class="mid" id="mid">
  <canvas id="cv"></canvas>
  <div id="hud">
    <span class="l">x:</span> <span id="hx">—</span><br>
    <span class="l">y:</span> <span id="hy">—</span>
  </div>
</div>

<div class="panel">
  <h3 id="pt">Walk Zone points</h3>
  <div id="pl"></div>
  <textarea id="out" readonly placeholder="Click 'Copy output' to generate code…"></textarea>
</div>

<script>
/* ── state ────────────────────────────────────────────── */
var mode = "walk";
var gridPct = 10;
var walkPts = [];   // {x,y} normalised 0-1
var itemPts = [];   // {x,y,name}

/* ── DOM ──────────────────────────────────────────────── */
var mid = document.getElementById("mid");
var cv  = document.getElementById("cv");
var c   = cv.getContext("2d");
var hx  = document.getElementById("hx");
var hy  = document.getElementById("hy");
var dbg = document.getElementById("dbg");

/* ── background image ─────────────────────────────────── */
var bgLoaded = false;
var bgImg = new Image();
var natW = 0, natH = 0;

bgImg.onload = function() {
  natW = bgImg.naturalWidth;
  natH = bgImg.naturalHeight;
  bgLoaded = true;
  dbg.textContent = "img OK " + natW + "×" + natH;
  fit();
};
bgImg.onerror = function() {
  dbg.textContent = "⚠ image failed to load";
  natW = 16; natH = 9; // fallback aspect
  fit();
};
bgImg.src = "./assets/noob_background.png";

/* ── stage geometry (px) ──────────────────────────────── */
var sW = 0, sH = 0, sL = 0, sT = 0;

function fit() {
  if (!natW) return;
  var mw = mid.clientWidth;
  var mh = mid.clientHeight;
  if (!mw || !mh) return;

  var ar = natW / natH;
  if (mw / mh > ar) {
    sH = mh; sW = mh * ar;
  } else {
    sW = mw; sH = mw / ar;
  }
  sL = (mw - sW) / 2;
  sT = (mh - sH) / 2;

  cv.width  = mw;
  cv.height = mh;
  cv.style.width  = mw + "px";
  cv.style.height = mh + "px";

  paint();
}

window.addEventListener("resize", fit);

/* ── coordinate helpers ───────────────────────────────── */
var mx = -1, my = -1; // normalised cursor (-1 = outside)

function toNorm(e) {
  var r = mid.getBoundingClientRect();
  var px = e.clientX - r.left - sL;
  var py = e.clientY - r.top  - sT;
  return { x: px / sW, y: py / sH };
}

function inside(n) { return n.x >= 0 && n.x <= 1 && n.y >= 0 && n.y <= 1; }

/* ── paint ────────────────────────────────────────────── */
function paint() {
  if (!sW) return;
  var w = cv.width, h = cv.height;
  c.clearRect(0, 0, w, h);

  // draw background image inside the stage rect
  if (bgLoaded) {
    c.drawImage(bgImg, sL, sT, sW, sH);
  } else {
    c.fillStyle = "#222";
    c.fillRect(sL, sT, sW, sH);
  }

  // grid
  if (gridPct > 0) {
    c.strokeStyle = "rgba(255,255,255,0.22)";
    c.lineWidth = 0.5;
    c.font = "11px Consolas,monospace";
    c.fillStyle = "rgba(255,255,255,0.35)";
    var step = gridPct / 100;
    for (var f = step; f < 1; f += step) {
      var gx = sL + f * sW;
      var gy = sT + f * sH;
      c.beginPath(); c.moveTo(gx, sT); c.lineTo(gx, sT + sH); c.stroke();
      c.beginPath(); c.moveTo(sL, gy); c.lineTo(sL + sW, gy); c.stroke();
      c.fillText(Math.round(f*100)+"%", gx + 3, sT + 13);
      c.fillText(Math.round(f*100)+"%", sL + 3, gy - 3);
    }
    // border
    c.strokeStyle = "rgba(255,255,255,0.3)";
    c.lineWidth = 1;
    c.strokeRect(sL, sT, sW, sH);
  }

  // walk polygon
  if (walkPts.length) {
    c.beginPath();
    walkPts.forEach(function(p, i) {
      var px = sL + p.x * sW, py = sT + p.y * sH;
      i === 0 ? c.moveTo(px, py) : c.lineTo(px, py);
    });
    c.closePath();
    c.fillStyle = "rgba(0,200,100,0.18)";
    c.fill();
    c.strokeStyle = "rgba(0,200,100,0.7)";
    c.lineWidth = 2;
    c.stroke();
    walkPts.forEach(function(p, i) {
      var px = sL + p.x * sW, py = sT + p.y * sH;
      c.beginPath(); c.arc(px, py, 5, 0, 6.3); c.fillStyle = "#0c8"; c.fill();
      c.fillStyle = "#fff"; c.font = "bold 11px Consolas,monospace";
      c.fillText(i + 1, px + 8, py + 4);
    });
  }

  // item markers
  itemPts.forEach(function(p) {
    var px = sL + p.x * sW, py = sT + p.y * sH;
    c.strokeStyle = "rgba(255,180,40,0.8)"; c.lineWidth = 1;
    c.beginPath(); c.moveTo(px-10,py); c.lineTo(px+10,py); c.stroke();
    c.beginPath(); c.moveTo(px,py-10); c.lineTo(px,py+10); c.stroke();
    c.beginPath(); c.arc(px, py, 4, 0, 6.3); c.fillStyle = "#fb0"; c.fill();
    c.fillStyle = "#fff"; c.font = "bold 12px Consolas,monospace";
    c.fillText(p.name, px + 10, py - 6);
  });

  // cursor crosshair
  if (mx >= 0 && mx <= 1 && my >= 0 && my <= 1) {
    var cx = sL + mx * sW, cy = sT + my * sH;
    c.setLineDash([4,4]);
    c.strokeStyle = "rgba(255,255,255,0.35)"; c.lineWidth = 1;
    c.beginPath(); c.moveTo(cx, sT); c.lineTo(cx, sT + sH); c.stroke();
    c.beginPath(); c.moveTo(sL, cy); c.lineTo(sL + sW, cy); c.stroke();
    c.setLineDash([]);
  }
}

/* ── events (on mid container — always visible) ───────── */
mid.onmousemove = function(e) {
  var n = toNorm(e);
  if (inside(n)) {
    mx = n.x; my = n.y;
    hx.textContent = (n.x * 100).toFixed(1) + " %";
    hy.textContent = (n.y * 100).toFixed(1) + " %";
  } else {
    mx = -1; my = -1;
    hx.textContent = "—"; hy.textContent = "—";
  }
  paint();
};

mid.onmouseleave = function() {
  mx = -1; my = -1;
  hx.textContent = "—"; hy.textContent = "—";
  paint();
};

mid.onclick = function(e) {
  var n = toNorm(e);
  if (!inside(n)) return;
  if (mode === "walk") {
    walkPts.push({x: n.x, y: n.y});
  } else {
    var name = prompt("Item name (e.g. pensieve, clock):");
    if (!name) return;
    itemPts.push({x: n.x, y: n.y, name: name.trim()});
  }
  renderPts(); paint();
};

mid.oncontextmenu = function(e) {
  e.preventDefault();
  if (mode === "walk" && walkPts.length) walkPts.pop();
  else if (mode === "item" && itemPts.length) itemPts.pop();
  renderPts(); paint();
};

/* ── toolbar actions ──────────────────────────────────── */
function setMode(m) {
  mode = m;
  document.getElementById("mWalk").className = m === "walk" ? "active" : "";
  document.getElementById("mItem").className = m === "item" ? "active" : "";
  document.getElementById("pt").textContent = m === "walk" ? "Walk Zone points" : "Item points";
  renderPts();
}

function undo() {
  if (mode === "walk") walkPts.pop(); else itemPts.pop();
  renderPts(); paint();
}

function clearMode() {
  if (mode === "walk") walkPts = []; else itemPts = [];
  renderPts(); paint();
}

function copyOut() {
  var out = "";
  if (mode === "walk") {
    out += "// Walkable polygon — paste into WALKABLE_POLYGON in room.js\n";
    out += "const WALKABLE_POLYGON = [\n";
    walkPts.forEach(function(p, i) {
      out += "  [" + p.x.toFixed(4) + ", " + p.y.toFixed(4) + "]" + (i < walkPts.length - 1 ? "," : "") + "\n";
    });
    out += "];\n";
  } else {
    out += "/* Item positions — paste into room.css */\n";
    itemPts.forEach(function(p) {
      var cls = ".roomItem" + p.name.charAt(0).toUpperCase() + p.name.slice(1);
      out += cls + " { --item-x: " + (p.x*100).toFixed(1) + "%; --item-y: " + (p.y*100).toFixed(1) + "%; }\n";
    });
  }
  var el = document.getElementById("out");
  el.value = out;
  el.select();
  try { navigator.clipboard.writeText(out); } catch(e) {}
}

/* ── panel rendering ──────────────────────────────────── */
function renderPts() {
  var pts = mode === "walk" ? walkPts : itemPts;
  var el = document.getElementById("pl");
  if (!pts.length) {
    el.innerHTML = '<div class="empty">Click on the image to place points. Right-click to undo.</div>';
    return;
  }
  el.innerHTML = pts.map(function(p, i) {
    var co = "(" + (p.x*100).toFixed(1) + "%, " + (p.y*100).toFixed(1) + "%)";
    var nm = p.name ? p.name : "#" + (i+1);
    return '<div class="pr"><button class="d" onclick="delPt('+i+')">&times;</button>'
      + '<span class="n">'+nm+'</span> <span class="c">'+co+'</span></div>';
  }).join("");
}

function delPt(i) {
  var pts = mode === "walk" ? walkPts : itemPts;
  pts.splice(i, 1);
  renderPts(); paint();
}

/* ── init ─────────────────────────────────────────────── */
renderPts();
// Ensure fit runs after layout settles
setTimeout(fit, 50);
</script>
</body>
</html>
