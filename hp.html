<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Joel and Hui Wen — Wedding 19 June 2027, JW Marriott South Beach Singapore" />
    <title>Joel & Hui Wen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="hp.css" />
  </head>
  <body>

    <!-- ═══════════════════════════════════════════════
         PERSISTENT UI — music toggle
    ══════════════════════════════════════════════════ -->
    <button
      class="musicToggle"
      type="button"
      aria-label="Toggle background music"
      data-music-toggle
    >
      <span class="musicIcon musicIconOn" aria-hidden="true">♪</span>
      <span class="musicIcon musicIconOff" aria-hidden="true">♪̶</span>
    </button>

    <!-- BGM — single track used for all views until per-view files are supplied -->
    <audio id="bgm-room"     loop preload="none" src="./assets/luis_humanoide-school-of-magic-inspired-by-harry-potter-289617.mp3"></audio>
    <audio id="bgm-pensieve" loop preload="none" src="./assets/luis_humanoide-school-of-magic-inspired-by-harry-potter-289617.mp3"></audio>
    <audio id="bgm-clock"    loop preload="none" src="./assets/luis_humanoide-school-of-magic-inspired-by-harry-potter-289617.mp3"></audio>
    <audio id="bgm-map"      loop preload="none" src="./assets/luis_humanoide-school-of-magic-inspired-by-harry-potter-289617.mp3"></audio>
    <audio id="bgm-rsvp"     loop preload="none" src="./assets/luis_humanoide-school-of-magic-inspired-by-harry-potter-289617.mp3"></audio>

    <main class="experience" data-experience>

      <!-- ═══════════════════════════════════════════════
           SCREEN 1 — Fat Lady Gate
      ══════════════════════════════════════════════════ -->
      <section class="gateScreen" data-gate-screen aria-label="Entrance gate">
        <div class="fatLadyPortrait" aria-hidden="true">
          <!-- CSS-art portrait frame -->
          <div class="portraitFrameOuter">
            <div class="portraitFrameInner">
              <div class="portraitCanvas">
                <img
                  class="fatLadyImage"
                  data-fat-lady-img
                  src="./assets/fat_lady_password_ask.jpg"
                  alt="The Fat Lady"
                />
              </div>
            </div>
          </div>
        </div>

        <div class="gateDialogue" data-gate-dialogue>
          <p class="fatLadyDialogueText" data-fat-lady-text></p>
        </div>

        <form class="passwordForm" data-password-form aria-label="Enter password" hidden>
          <label class="passwordLabel" for="passwordInput">Password</label>
          <div class="passwordInputRow">
            <input
              class="passwordInput"
              id="passwordInput"
              type="password"
              name="password"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="speak the password…"
              data-password-input
            />
            <button class="passwordSubmit" type="submit" data-password-submit>Open</button>
          </div>
          <p class="passwordError" data-password-error aria-live="polite" hidden></p>
        </form>

        <p class="lockoutMessage" data-lockout-message hidden aria-live="polite">
          You have been locked out. Please try again in 24 hours.
        </p>
      </section>

      <!-- ═══════════════════════════════════════════════
           TRANSITION — Fat Lady door swing overlay
           (sits over gate, animates open to reveal room)
      ══════════════════════════════════════════════════ -->
      <div class="doorSwing" data-door-swing aria-hidden="true" hidden>
        <div class="doorSwingLeft"></div>
        <div class="doorSwingRight"></div>
      </div>

      <!-- ═══════════════════════════════════════════════
           SCREEN 2 — Common Room
      ══════════════════════════════════════════════════ -->
      <section class="roomScreen" data-room-screen aria-label="Common room" hidden>
        <!-- CSS-art room scene -->
        <div class="roomScene" aria-hidden="true">
          <!-- Background layers -->
          <div class="roomWallBack"></div>
          <div class="roomFloor"></div>
          <div class="roomWallLeft"></div>
          <div class="roomWallRight"></div>
          <!-- Fireplace -->
          <div class="roomFireplace">
            <div class="roomFireFlame roomFireFlame1"></div>
            <div class="roomFireFlame roomFireFlame2"></div>
            <div class="roomFireFlame roomFireFlame3"></div>
          </div>
          <!-- Candle sconces (lit by lumos / nox spell) -->
          <div class="roomCandle roomCandleLeft" data-candle>
            <div class="roomCandleStick"></div>
            <div class="roomCandleFlame"></div>
            <div class="roomCandleGlow"></div>
          </div>
          <div class="roomCandle roomCandleRight" data-candle>
            <div class="roomCandleStick"></div>
            <div class="roomCandleFlame"></div>
            <div class="roomCandleGlow"></div>
          </div>
          <!-- Bookshelf -->
          <div class="roomBookshelf">
            <div class="roomBook roomBook1"></div>
            <div class="roomBook roomBook2"></div>
            <div class="roomBook roomBook3"></div>
            <div class="roomBook roomBook4"></div>
            <div class="roomBook roomBook5"></div>
            <div class="roomBook roomBook6"></div>
          </div>
          <!-- Table -->
          <div class="roomTable"></div>
        </div>

        <!-- Sprite cursor-follower -->
        <div class="roomSprite" data-room-sprite aria-hidden="true"></div>

        <!-- Interactive items -->
        <div class="roomItems">
          <!-- Pensieve -->
          <button
            class="roomItem roomItemPensieve"
            type="button"
            data-room-item="pensieve"
            aria-label="Pensieve — memories"
          >
            <div class="roomItemArt pensieveArt" aria-hidden="true">
              <div class="pensieveBasin">
                <div class="pensieveLiquid"></div>
                <div class="pensieveGlow"></div>
              </div>
              <div class="pensievePedestal"></div>
            </div>
            <span class="roomItemLabel">Pensieve</span>
          </button>

          <!-- Clock -->
          <button
            class="roomItem roomItemClock"
            type="button"
            data-room-item="clock"
            aria-label="The clock"
          >
            <div class="roomItemArt clockArt" aria-hidden="true">
              <div class="wallClockFace">
                <div class="wallClockHand wallClockHandHour"></div>
                <div class="wallClockHand wallClockHandMinute"></div>
                <div class="wallClockCenter"></div>
              </div>
              <div class="wallClockBase"></div>
            </div>
            <span class="roomItemLabel">Clock</span>
          </button>

          <!-- Map -->
          <button
            class="roomItem roomItemMap"
            type="button"
            data-room-item="map"
            aria-label="Marauder's Map"
          >
            <div class="roomItemArt mapArt" aria-hidden="true">
              <div class="tableMapPaper">
                <div class="tableMapLines">
                  <div class="tableMapLine"></div>
                  <div class="tableMapLine"></div>
                  <div class="tableMapLine"></div>
                </div>
              </div>
            </div>
            <span class="roomItemLabel">Map</span>
          </button>

          <!-- Owl Stand -->
          <button
            class="roomItem roomItemOwl"
            type="button"
            data-room-item="rsvp"
            aria-label="Owl stand — RSVP"
          >
            <div class="roomItemArt owlArt" aria-hidden="true">
              <div class="owlBody">
                <div class="owlHead">
                  <div class="owlEye owlEyeLeft"></div>
                  <div class="owlEye owlEyeRight"></div>
                  <div class="owlBeak"></div>
                </div>
                <div class="owlWing owlWingLeft"></div>
                <div class="owlWing owlWingRight"></div>
                <div class="owlFeet"></div>
              </div>
              <div class="owlStandPole"></div>
              <div class="owlStandBase"></div>
            </div>
            <span class="roomItemLabel">Send a Letter</span>
          </button>
        </div>

        <!-- Room blur overlay (activated on item hover) -->
        <div class="roomBlurOverlay" data-room-blur-overlay aria-hidden="true"></div>
      </section>

      <!-- ═══════════════════════════════════════════════
           FIRST-TIME OWL / RSVP INTRO ANIMATION
           (plays once after door swing, before room is interactive)
      ══════════════════════════════════════════════════ -->
      <div class="owlIntro" data-owl-intro aria-hidden="true" hidden>
        <button class="panelClose owlIntroClose" type="button" data-owl-intro-close aria-label="Close">✕</button>
        <div class="owlIntroOwl" data-owl-intro-owl>
          <div class="owlBody owlBodyLarge">
            <div class="owlHead owlHeadLarge">
              <div class="owlEye owlEyeLeft"></div>
              <div class="owlEye owlEyeRight"></div>
              <div class="owlBeak"></div>
            </div>
            <div class="owlWing owlWingLeft"></div>
            <div class="owlWing owlWingRight"></div>
          </div>
        </div>
        <!-- Envelope drop -->
        <div class="owlIntroEnvelope" data-owl-intro-envelope hidden>
          <div class="envelopeBody">
            <div class="envelopeFlapTop" data-envelope-flap></div>
            <div class="envelopeInner">
              <!-- Tally RSVP form -->
              <div class="envelopeFormWrapper">
                <iframe
                  class="rsvpFormEmbed"
                  data-tally-src="https://tally.so/embed/Pd07pB?alignLeft=1&hideTitle=1&transparentBackground=1"
                  loading="lazy"
                  width="100%"
                  height="100%"
                  frameborder="0"
                  marginheight="0"
                  marginwidth="0"
                  title="Joel and Hui Wen RSVP form"
                ></iframe>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══════════════════════════════════════════════
           OVERLAY PANELS (pensieve / clock / map / rsvp)
      ══════════════════════════════════════════════════ -->
      <section class="overlayLayer" aria-live="polite">

        <!-- Close button (shared, floated) -->
        <!-- Each popup renders its own close button for accessibility -->

        <!-- ── Pensieve ── -->
        <div
          id="pensieve-panel"
          class="panel"
          data-panel="pensieve"
          role="dialog"
          aria-modal="true"
          aria-label="Memories — Pensieve"
          hidden
        >
          <button class="panelClose" type="button" data-panel-close aria-label="Close pensieve">✕</button>
          <div class="panelSurface pensievePanelSurface">
            <div class="pensieveRippleOrigin" data-pensieve-ripple aria-hidden="true"></div>
            <div class="pensieveGallery" data-pensieve-gallery>
              <!-- Placeholder frames — replace src with real assets -->
              <div class="photoFrame photoFrameTall">
                <img src="./photos/placeholder_1.jpg" alt="Memory 1" loading="lazy" />
              </div>
              <div class="photoFrame photoFrameWide">
                <img src="./photos/placeholder_2.jpg" alt="Memory 2" loading="lazy" />
              </div>
              <div class="photoFrame photoFrameSquare">
                <img src="./photos/placeholder_3.jpg" alt="Memory 3" loading="lazy" />
              </div>
              <div class="photoFrame photoFrameTall">
                <img src="./photos/placeholder_4.jpg" alt="Memory 4" loading="lazy" />
              </div>
              <div class="photoFrame photoFrameWide">
                <video src="./photos/placeholder_5.mp4" muted playsinline loop aria-label="Memory video 5"></video>
              </div>
              <div class="photoFrame photoFrameSquare">
                <img src="./photos/placeholder_6.jpg" alt="Memory 6" loading="lazy" />
              </div>
              <div class="photoFrame photoFrameTall">
                <img src="./photos/placeholder_7.jpg" alt="Memory 7" loading="lazy" />
              </div>
              <div class="photoFrame photoFrameWide">
                <img src="./photos/placeholder_8.jpg" alt="Memory 8" loading="lazy" />
              </div>
            </div>
          </div>
        </div>

        <!-- ── Weasley Clock ── -->
        <div
          id="clock-panel"
          class="panel"
          data-panel="clock"
          role="dialog"
          aria-modal="true"
          aria-label="The Clock"
          hidden
        >
          <button class="panelClose" type="button" data-panel-close aria-label="Close clock">✕</button>
          <div class="panelSurface clockPanelSurface">
            <div class="specialClock" data-special-clock data-hw-location="work" data-joel-location="work">
              <div class="specialClockFace" aria-hidden="true">
                <span class="specialClockFaceGlow"></span>
                <span class="specialClockCenterRing"></span>
                <span class="specialClockHub"></span>

                <div class="specialClockLabels">
                  <span class="specialClockLabel" data-clock-place="work"  style="--label-angle: 0deg">Work</span>
                  <span class="specialClockLabel" data-clock-place="gym"   style="--label-angle: 60deg">Gym</span>
                  <span class="specialClockLabel" data-clock-place="yoga"  style="--label-angle: 120deg">Yoga</span>
                  <span class="specialClockLabel" data-clock-place="toilet" style="--label-angle: 180deg">Toilet</span>
                  <span class="specialClockLabel" data-clock-place="bed"   style="--label-angle: 240deg">Bed</span>
                  <span class="specialClockLabel" data-clock-place="desk"  style="--label-angle: 300deg">Desk</span>
                </div>

                <span class="specialClockHand specialClockHandHw" data-clock-hand="hw">
                  <img class="specialClockHandTip" src="./clock_hw.png" alt="" />
                </span>
                <span class="specialClockHand specialClockHandJoel" data-clock-hand="joel">
                  <img class="specialClockHandTip" src="./clock_joel.png" alt="" />
                </span>
              </div>

              <div class="specialClockReadout">
                <p class="specialClockEyebrow">Where the hands are pointing</p>
                <div class="specialClockStatusGrid">
                  <section class="specialClockNoteCard specialClockNoteCardHw">
                    <p class="specialClockPerson">Hui Wen</p>
                    <p class="specialClockStatus" data-clock-status="hw">Work</p>
                    <div class="specialClockNoteBox" data-clock-note="hw"></div>
                  </section>
                  <section class="specialClockNoteCard specialClockNoteCardJoel">
                    <p class="specialClockPerson">Joel</p>
                    <p class="specialClockStatus" data-clock-status="joel">Work</p>
                    <div class="specialClockNoteBox" data-clock-note="joel"></div>
                  </section>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ── Marauder's Map ── -->
        <div
          id="map-panel"
          class="panel"
          data-panel="map"
          role="dialog"
          aria-modal="true"
          aria-label="Marauder's Map"
          hidden
        >
          <button class="replayMapBtn" type="button" data-replay-map>Replay</button>
          <button class="panelClose" type="button" data-panel-close aria-label="Close map">✕</button>
          <div class="panelSurface mapPopupSurface" data-map-surface>
            <div class="mapIntroStage" data-map-intro-stage aria-hidden="true" hidden>
              <div class="mapIntroShell">
                <div class="mapIntroPaper">
                  <span class="mapIntroPaperFace mapIntroPaperFaceBase"></span>
                  <span class="mapIntroPaperFace mapIntroPaperFaceLeft"></span>
                  <span class="mapIntroPaperFace mapIntroPaperFaceRight"></span>
                </div>
              </div>
            </div>

            <div class="mapWritingStage" data-map-writing-stage>
              <div class="mapWritingContainer">
                <svg
                  class="mapSpellSvg"
                  viewBox="0 0 760 220"
                  aria-hidden="true"
                  preserveAspectRatio="xMidYMid meet"
                  data-map-spell-svg
                >
                  <text class="mapSpellLineText" x="380" y="88"  data-map-line-text>I solemnly swear</text>
                  <text class="mapSpellLineText" x="380" y="150" data-map-line-text>I am up to no good</text>
                </svg>
                <img class="mapQuill" src="./quill.png" alt="" data-map-quill />
              </div>
            </div>

            <div class="mapBlankStage" data-map-blank-stage hidden aria-hidden="true">
              <!-- Venue map content — placeholder until real floor plan supplied -->
              <div class="venueMap">
                <div class="venueMapPlaceholder">
                  <p>JW Marriott South Beach</p>
                  <p>Singapore</p>
                  <p>19 June 2027 · 7 PM</p>
                </div>
                <!-- Animated footprints -->
                <div class="footprintTrack" aria-hidden="true">
                  <div class="footprint footprint1"></div>
                  <div class="footprint footprint2"></div>
                  <div class="footprint footprint3"></div>
                  <div class="footprint footprint4"></div>
                  <div class="footprint footprint5"></div>
                  <div class="footprint footprint6"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ── RSVP / Owl Stand ── -->
        <div
          id="rsvp-panel"
          class="panel"
          data-panel="rsvp"
          role="dialog"
          aria-modal="true"
          aria-label="RSVP"
          hidden
        >
          <button class="panelClose" type="button" data-panel-close aria-label="Close RSVP">✕</button>
          <div class="panelSurface rsvpPanelSurface">
            <!-- Owl + envelope animation lives here -->
            <div class="owlRsvpAnim" data-owl-rsvp-anim aria-hidden="true">
              <div class="owlRsvpOwl" data-owl-rsvp-owl>
                <div class="owlBody owlBodyLarge">
                  <div class="owlHead owlHeadLarge">
                    <div class="owlEye owlEyeLeft"></div>
                    <div class="owlEye owlEyeRight"></div>
                    <div class="owlBeak"></div>
                  </div>
                  <div class="owlWing owlWingLeft"></div>
                  <div class="owlWing owlWingRight"></div>
                </div>
              </div>
            </div>
            <div class="rsvpEnvelopeWrap" data-rsvp-envelope-wrap>
              <div class="envelopeBody" data-rsvp-envelope>
                <div class="envelopeFlapTop" data-envelope-flap></div>
                <div class="envelopeInner">
                  <div class="envelopeFormWrapper">
                    <iframe
                      class="rsvpFormEmbed"
                      data-tally-src="https://tally.so/embed/Pd07pB?alignLeft=1&hideTitle=1&transparentBackground=1"
                      loading="lazy"
                      width="100%"
                      height="100%"
                      frameborder="0"
                      marginheight="0"
                      marginwidth="0"
                      title="Joel and Hui Wen RSVP form"
                    ></iframe>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </section><!-- /overlayLayer -->

    </main><!-- /experience -->

    <!-- Wand sparkle canvas -->
    <canvas class="wandCanvas" data-wand-canvas aria-hidden="true"></canvas>

    <script type="module" src="./hp.js"></script>
  </body>
</html>
